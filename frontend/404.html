<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 - Page non trouvée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root{
        --primary:#0d6efd;
        --accent:#1558d0;
      }
      body {
        min-height: 100vh;
        background: linear-gradient(180deg, #d9e8ff 0%, #eff6ff 40%, #d8e7ff 100%);
        background-image: radial-gradient(circle at 18% 18%, rgba(13,110,253,0.20), transparent 22%),
                          radial-gradient(circle at 82% 12%, rgba(13,110,253,0.10), transparent 20%),
                          radial-gradient(circle at 50% 88%, rgba(13,110,253,0.07), transparent 26%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .error-container {
        text-align: center;
        background: rgba(255,255,255,0.98);
        padding: 60px 40px;
        border-radius: 24px;
        box-shadow: 0 28px 70px rgba(13,110,253,0.12);
        max-width: 600px;
      }
      .error-code {
        font-size: 120px;
        font-weight: 900;
        color: var(--primary);
        line-height: 1;
        margin-bottom: 20px;
        text-shadow: 0 4px 12px rgba(13,110,253,0.2);
      }
      .error-message {
        font-size: 24px;
        color: #333;
        margin-bottom: 30px;
      }
      .btn-home {
        background: var(--primary);
        border-color: var(--primary);
        border-radius: 10px;
        padding: 12px 32px;
        font-size: 18px;
        text-decoration: none;
        color: white;
        display: inline-block;
        transition: all 0.3s ease;
      }
      .btn-home:hover {
        background: var(--accent);
        border-color: var(--accent);
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(13,110,253,0.3);
      }
      .icon {
        font-size: 80px;
        margin-bottom: 20px;
      }
    </style>
  </head>
  <body>
    <div class="error-container">
      <div class="icon">🔍</div>
      <div class="error-code">404</div>
      <div class="error-message">Oups ! Page non trouvée</div>
      <p class="text-muted mb-4">
        La page que vous recherchez n'existe pas ou a été déplacée.
      </p>
      <a href="/" class="btn-home">
        Retour à l'accueil
      </a>
    </div>
  </body>
</html>
