<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Recherche de mentors</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
  </head>
  <body>
    <div class="container py-5">
      <div class="header p-3 mb-4 d-flex align-items-center rounded-3 shadow-sm">
        <img src="static/logo.svg" alt="logo" class="logo me-3">
        <div>
          <h1 class="mb-0">Trouver un mentor</h1>
          <small class="text-muted">Matching par compétences et disponibilité</small>
        </div>
      </div>

      <form id="searchForm" class="row g-3 mb-4">
        <div class="col-md-3">
          <label class="form-label">Heure souhaitée (24h)</label>
          <select id="time" class="form-select">
            <option value="">-- Choisir une heure --</option>
            <option>00:00</option>
            <option>00:30</option>
            <option>01:00</option>
            <option>01:30</option>
            <option>02:00</option>
            <option>02:30</option>
            <option>03:00</option>
            <option>03:30</option>
            <option>04:00</option>
            <option>04:30</option>
            <option>05:00</option>
            <option>05:30</option>
            <option>06:00</option>
            <option>06:30</option>
            <option>07:00</option>
            <option>07:30</option>
            <option>08:00</option>
            <option>08:30</option>
            <option>09:00</option>
            <option>09:30</option>
            <option>10:00</option>
            <option>10:30</option>
            <option>11:00</option>
            <option>11:30</option>
            <option>12:00</option>
            <option>12:30</option>
            <option>13:00</option>
            <option>13:30</option>
            <option>14:00</option>
            <option>14:30</option>
            <option>15:00</option>
            <option>15:30</option>
            <option>16:00</option>
            <option>16:30</option>
            <option>17:00</option>
            <option>17:30</option>
            <option>18:00</option>
            <option>18:30</option>
            <option>19:00</option>
            <option>19:30</option>
            <option>20:00</option>
            <option>20:30</option>
            <option>21:00</option>
            <option>21:30</option>
            <option>22:00</option>
            <option>22:30</option>
            <option>23:00</option>
            <option>23:30</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">Filière (optionnel)</label>
          <select id="filiere" class="form-select">
            <option value="">-- Choisir (optionnel) --</option>
            <option>Sécurité Informatique</option>
            <option>Intelligence Artificielle</option>
            <option>Système Embarqué & IoT</option>
            <option>Génie Logiciel</option>
            <option>Systèmes d’Information</option>
            <option>Internet Multimedia</option>
            <option>SIRI</option>
          </select>
          <div class="form-text">Choisir une filière met à jour automatiquement les matières.</div>
        </div>

        <div class="col-md-3">
          <label class="form-label">Format</label>
          <select id="format" class="form-select">
            <option value="">-- Tous formats --</option>
            <option>En ligne</option>
            <option>Présentiel</option>
            <option>Les deux</option>
          </select>
          <div class="form-text">Filtrer par format de mentorat.</div>
        </div>

        <div class="col-12">
          <label class="form-label">Matières / compétences</label>
          <div id="subjectsContainer" class="border rounded p-3 bg-white"></div>
          <div class="form-text">Cochez les matières que vous souhaitez rechercher.</div>
        </div>

        <div class="col-12">
          <button id="searchBtn" type="submit" class="btn btn-primary">Rechercher</button>
        </div>
      </form>

      <div id="results" class="mt-3">
        <p class="text-muted">Résultats s'afficheront ici.</p>
      </div>
    </div>

    <script src="static/app.js"></script>
  </body>
</html>
